<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Participantes | Seguros Unimed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Unimed brand palette */
    --unimed-green: #00995D;
    --unimed-green-dark: #007A4A;
    --unimed-green-light: #00B36B;
    --unimed-green-subtle: rgba(0,153,93,0.08);
    --unimed-green-glow: rgba(0,153,93,0.15);

    --bg-primary: #FAFCFB;
    --bg-card: #FFFFFF;
    --bg-card-hover: #F5F9F7;
    --bg-surface: #F0F5F3;
    --bg-header: rgba(250,252,251,0.92);

    --text-primary: #1A2B23;
    --text-secondary: #4A5D53;
    --text-muted: #8A9B93;
    --text-on-green: #FFFFFF;

    --border: rgba(0,0,0,0.06);
    --border-green: rgba(0,153,93,0.2);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-card: 0 1px 4px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);

    /* Role colors */
    --role-realizadora: #00995D;
    --role-apoiadora: #2563EB;
    --role-palestrante: #9333EA;
    --role-homenageada: #DC2626;
    --role-patrocinadora: #D97706;
    --role-convidada: #6B7280;

    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Hero Header ── */
  .hero {
    background: linear-gradient(145deg, var(--unimed-green-dark) 0%, var(--unimed-green) 50%, var(--unimed-green-light) 100%);
    padding: calc(var(--safe-top) + 20px) 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -40%; right: -20%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -30%; left: -10%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-content { position: relative; z-index: 1; }

  .hero-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .hero-logo-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  .hero-logo-icon svg {
    width: 20px; height: 20px;
    fill: white;
  }

  .hero-logo-text {
    font-size: 0.75rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.75rem;
    font-weight: 600;
    color: white;
    line-height: 1.15;
    margin-bottom: 6px;
  }

  .hero-subtitle {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }

  .hero-stats {
    display: flex;
    gap: 16px;
    margin-top: 16px;
  }

  .hero-stat {
    display: flex;
    flex-direction: column;
  }

  .hero-stat-number {
    font-size: 1.4rem;
    font-weight: 800;
    color: white;
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ── Sticky Search/Filter Bar ── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-header);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 17px; height: 17px;
    color: var(--text-muted);
  }

  .search-input {
    width: 100%;
    padding: 11px 40px 11px 42px;
    background: var(--bg-surface);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }

  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    border-color: var(--unimed-green);
    background: var(--bg-card);
    box-shadow: 0 0 0 3px var(--unimed-green-glow);
  }

  .search-clear {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    width: 24px; height: 24px;
    background: var(--bg-surface);
    border: none;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
  }

  .search-clear.visible { display: flex; }

  .search-clear svg { width: 14px; height: 14px; }

  /* ── Filters ── */
  .filters-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 2px;
  }
  .filters-scroll::-webkit-scrollbar { display: none; }

  .filter-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s;
    user-select: none;
  }

  .filter-chip:hover { border-color: var(--unimed-green); color: var(--unimed-green); }

  .filter-chip.active {
    background: var(--unimed-green);
    border-color: var(--unimed-green);
    color: white;
  }

  .filter-chip .chip-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .filter-chip.active .chip-dot { background: rgba(255,255,255,0.5); }

  /* ── Content ── */
  .content {
    flex: 1;
    padding: 12px 16px calc(var(--safe-bottom) + 20px);
  }

  /* ── Company Section ── */
  .company-section {
    margin-bottom: 20px;
    animation: fadeSlideUp 0.35s ease-out both;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .company-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .company-icon {
    width: 38px; height: 38px;
    border-radius: var(--radius-xs);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 700;
    flex-shrink: 0;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--unimed-green);
  }

  .company-meta { flex: 1; min-width: 0; }

  .company-name {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .company-role-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 3px;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .role-tag-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
  }

  .tag-realizadora { background: rgba(0,153,93,0.1); color: var(--role-realizadora); }
  .tag-realizadora .role-tag-dot { background: var(--role-realizadora); }
  .tag-apoiadora { background: rgba(37,99,235,0.08); color: var(--role-apoiadora); }
  .tag-apoiadora .role-tag-dot { background: var(--role-apoiadora); }
  .tag-palestrante { background: rgba(147,51,234,0.08); color: var(--role-palestrante); }
  .tag-palestrante .role-tag-dot { background: var(--role-palestrante); }
  .tag-homenageada { background: rgba(220,38,38,0.08); color: var(--role-homenageada); }
  .tag-homenageada .role-tag-dot { background: var(--role-homenageada); }
  .tag-patrocinadora { background: rgba(217,119,6,0.08); color: var(--role-patrocinadora); }
  .tag-patrocinadora .role-tag-dot { background: var(--role-patrocinadora); }
  .tag-convidada { background: rgba(107,114,128,0.08); color: var(--role-convidada); }
  .tag-convidada .role-tag-dot { background: var(--role-convidada); }

  .company-count {
    font-size: 0.68rem;
    color: var(--text-muted);
    background: var(--bg-surface);
    padding: 4px 10px;
    border-radius: 10px;
    flex-shrink: 0;
    font-weight: 600;
  }

  /* ── Participant Card ── */
  .participant-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
    box-shadow: var(--shadow-card);
    transition: transform 0.12s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .participant-card:active {
    transform: scale(0.985);
  }

  .participant-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }

  .participant-card.h1::before { background: var(--unimed-green); }
  .participant-card.h2::before { background: var(--unimed-green); opacity: 0.4; }
  .participant-card.h3::before { background: var(--text-muted); opacity: 0.25; }

  .avatar {
    width: 50px; height: 50px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg-surface);
    position: relative;
    border: 2px solid var(--bg-surface);
  }

  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .avatar-initials {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--unimed-green), var(--unimed-green-light));
    font-size: 0.85rem;
    font-weight: 700;
    color: white;
  }

  .participant-info { flex: 1; min-width: 0; }

  .participant-name {
    font-weight: 600;
    font-size: 0.88rem;
    color: var(--text-primary);
    line-height: 1.25;
  }

  .participant-specialty {
    font-size: 0.72rem;
    color: var(--unimed-green);
    font-weight: 600;
    margin-top: 1px;
  }

  .participant-position {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Category Filters specific dots ── */
  .dot-realizadora { background: var(--role-realizadora); }
  .dot-apoiadora { background: var(--role-apoiadora); }
  .dot-palestrante { background: var(--role-palestrante); }
  .dot-homenageada { background: var(--role-homenageada); }
  .dot-patrocinadora { background: var(--role-patrocinadora); }
  .dot-convidada { background: var(--role-convidada); }

  /* ── Empty ── */
  .empty-state {
    text-align: center;
    padding: 50px 24px;
  }

  .empty-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-surface);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
  }

  .empty-icon svg {
    width: 26px; height: 26px;
    color: var(--text-muted);
  }

  .empty-state h3 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .empty-state p {
    font-size: 0.78rem;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* ── Specialty filter chips (second row) ── */
  .filter-row-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    margin-top: 8px;
  }

  /* ── Animation delays ── */
  .company-section:nth-child(1) { animation-delay: 0s; }
  .company-section:nth-child(2) { animation-delay: 0.04s; }
  .company-section:nth-child(3) { animation-delay: 0.08s; }
  .company-section:nth-child(4) { animation-delay: 0.12s; }
  .company-section:nth-child(5) { animation-delay: 0.16s; }
  .company-section:nth-child(6) { animation-delay: 0.2s; }
  .company-section:nth-child(7) { animation-delay: 0.24s; }
  .company-section:nth-child(8) { animation-delay: 0.28s; }

  /* ── Scrollbar ── */
  .content::-webkit-scrollbar { width: 3px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Active filter count badge ── */
  .active-filters-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: var(--unimed-green-subtle);
    border-bottom: 1px solid var(--border-green);
    font-size: 0.75rem;
    color: var(--unimed-green);
    font-weight: 600;
  }

  .clear-filters {
    background: none;
    border: none;
    color: var(--unimed-green);
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// ══════════════════════════════════════════════════
// MOCK DATA — Seguros Unimed Medical Event
// ══════════════════════════════════════════════════

// All unique specialties for filter
function getAllSpecialties(data) {
  const specs = new Set();
  data.forEach(c => c.participants.forEach(p => {
    if (p.specialty) specs.add(p.specialty);
  }));
  return [...specs].sort((a, b) => a.localeCompare(b, 'pt-BR'));
}

// All unique roles for filter
function getAllRoles(data) {
  const roles = [];
  const seen = new Set();
  data.forEach(c => {
    if (!seen.has(c.roleClass)) {
      seen.add(c.roleClass);
      roles.push({ roleClass: c.roleClass, label: c.roleClass.charAt(0).toUpperCase() + c.roleClass.slice(1) });
    }
  });
  return roles;
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let state = {
  searchQuery: '',
  activeRoleFilter: null,   // roleClass string or null
  activeSpecFilter: null,    // specialty string or null
  data: MOCK_DATA.sort((a, b) => a.company.localeCompare(b.company, 'pt-BR')),
};

function getInitials(name) {
  return name.replace(/^(Dr\.|Dra\.|Prof\.)\s*/i, '')
    .split(' ')
    .filter(w => w.length > 1)
    .slice(0, 2)
    .map(w => w[0])
    .join('')
    .toUpperCase();
}

function getTotalParticipants(data) {
  return data.reduce((s, c) => s + c.participants.length, 0);
}

function filterData(data, query, roleFilter, specFilter) {
  let result = data;

  // Role filter
  if (roleFilter) {
    result = result.filter(c => c.roleClass === roleFilter);
  }

  // Specialty filter
  if (specFilter) {
    result = result
      .map(c => ({
        ...c,
        participants: c.participants.filter(p => p.specialty === specFilter)
      }))
      .filter(c => c.participants.length > 0);
  }

  // Search
  if (query.trim()) {
    const q = query.toLowerCase();
    result = result
      .map(c => ({
        ...c,
        participants: c.participants.filter(p =>
          p.name.toLowerCase().includes(q) ||
          (p.specialty && p.specialty.toLowerCase().includes(q)) ||
          p.position.toLowerCase().includes(q) ||
          c.company.toLowerCase().includes(q)
        )
      }))
      .filter(c => c.participants.length > 0);
  }

  return result;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const filtered = filterData(state.data, state.searchQuery, state.activeRoleFilter, state.activeSpecFilter);
  const totalAll = getTotalParticipants(state.data);
  const totalFiltered = getTotalParticipants(filtered);
  const allRoles = getAllRoles(state.data);
  const allSpecs = getAllSpecialties(state.data);
  const hasFilters = state.activeRoleFilter || state.activeSpecFilter;

  app.innerHTML = `
    <!-- HERO -->
    <div class="hero">
      <div class="hero-content">
        <div class="hero-logo">
          <div class="hero-logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93 0-.62.08-1.22.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          </div>
          <span class="hero-logo-text">Seguros Unimed</span>
        </div>
        <h1>Encontro Médico<br/>Nacional 2026</h1>
        <p class="hero-subtitle">Conheça os participantes do evento</p>
        <div class="hero-stats">
          <div class="hero-stat">
            <span class="hero-stat-number">${totalAll}</span>
            <span class="hero-stat-label">Participantes</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-number">${state.data.length}</span>
            <span class="hero-stat-label">Instituições</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-number">${allSpecs.length}</span>
            <span class="hero-stat-label">Especialidades</span>
          </div>
        </div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" class="search-input" placeholder="Buscar por nome, especialidade ou instituição..." value="${state.searchQuery}" id="searchInput" />
        <button class="search-clear ${state.searchQuery ? 'visible' : ''}" id="searchClear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="filter-row-label">Papel no evento</div>
      <div class="filters-scroll" id="roleFilters">
        <button class="filter-chip ${!state.activeRoleFilter ? 'active' : ''}" data-role="">
          Todos
        </button>
        ${allRoles.map(r => `
          <button class="filter-chip ${state.activeRoleFilter === r.roleClass ? 'active' : ''}" data-role="${r.roleClass}">
            <span class="chip-dot dot-${r.roleClass}"></span>
            ${r.label}
          </button>
        `).join('')}
      </div>

      <div class="filter-row-label">Especialidade médica</div>
      <div class="filters-scroll" id="specFilters">
        <button class="filter-chip spec-chip ${!state.activeSpecFilter ? 'active' : ''}" data-spec="">
          Todas
        </button>
        ${allSpecs.map(s => `
          <button class="filter-chip spec-chip ${state.activeSpecFilter === s ? 'active' : ''}" data-spec="${s}">
            ${s}
          </button>
        `).join('')}
      </div>
    </div>

    ${hasFilters ? `
      <div class="active-filters-bar">
        <span>${totalFiltered} resultado${totalFiltered !== 1 ? 's' : ''} encontrado${totalFiltered !== 1 ? 's' : ''}</span>
        <button class="clear-filters" id="clearAllFilters">Limpar filtros</button>
      </div>
    ` : ''}

    <!-- CONTENT -->
    <div class="content">
      ${renderList(filtered)}
    </div>
  `;

  attachEvents();
}

function renderList(data) {
  if (data.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </div>
        <h3>Nenhum participante encontrado</h3>
        <p>Tente ajustar os filtros ou buscar<br/>por outro nome ou especialidade</p>
      </div>
    `;
  }

  return data.map(company => `
    <div class="company-section">
      <div class="company-header">
        <div class="company-icon">${company.company[0]}</div>
        <div class="company-meta">
          <div class="company-name">${company.company}</div>
          <div class="company-role-tag tag-${company.roleClass}">
            <span class="role-tag-dot"></span>
            ${company.role}
          </div>
        </div>
        <div class="company-count">${company.participants.length}</div>
      </div>
      ${company.participants.map(p => `
        <div class="participant-card h${p.hierarchy}">
          <div class="avatar">
            ${p.photo
              ? `<img src="${p.photo}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=avatar-initials>${getInitials(p.name)}</div>'" />`
              : `<div class="avatar-initials">${getInitials(p.name)}</div>`
            }
          </div>
          <div class="participant-info">
            <div class="participant-name">${p.name}</div>
            ${p.specialty ? `<div class="participant-specialty">${p.specialty}</div>` : ''}
            <div class="participant-position">${p.position}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════
function attachEvents() {
  // Search
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      render();
      const el = document.getElementById('searchInput');
      if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    });
  }

  // Clear search
  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      state.searchQuery = '';
      render();
      document.getElementById('searchInput')?.focus();
    });
  }

  // Role filters
  document.querySelectorAll('#roleFilters .filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const role = chip.dataset.role;
      state.activeRoleFilter = role || null;
      render();
    });
  });

  // Specialty filters
  document.querySelectorAll('#specFilters .spec-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const spec = chip.dataset.spec;
      state.activeSpecFilter = spec || null;
      render();
    });
  });

  // Clear all filters
  const clearAll = document.getElementById('clearAllFilters');
  if (clearAll) {
    clearAll.addEventListener('click', () => {
      state.activeRoleFilter = null;
      state.activeSpecFilter = null;
      state.searchQuery = '';
      render();
    });
  }
}

// ── Init ──
render();
</script>

</body>
</html>
