<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Participantes | Seguros Unimed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #00857C;
    --teal-dk: #006B63;
    --teal-lt: #009E94;
    --c-org: #00857C;
    --c-apoio: #E08A2C;
    --c-suc: #1B5E92;
    --bg: #F5F5F5;
    --card: #FFFFFF;
    --t1: #2A2A2A;
    --t2: #5A5A5A;
    --t3: #999;
    --brd: #E0E0E0;
    --shd: 0 1px 4px rgba(0,0,0,0.06);
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh}

  /* HERO */
  .hero{background:linear-gradient(160deg,var(--teal-dk),var(--teal) 60%,var(--teal-lt));padding:calc(var(--sat) + 24px) 20px 28px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-60%;right:-30%;width:320px;height:320px;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);border-radius:50%}
  .hero h1{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;color:#fff;line-height:1.2;position:relative;font-style:italic}

  /* TOOLBAR */
  .toolbar{position:sticky;top:0;z-index:100;background:rgba(245,245,245,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:10px 16px;border-bottom:1px solid var(--brd)}
  .search-row{display:flex;gap:8px;align-items:center}
  .search-wrap{flex:1;position:relative}
  .search-wrap>svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--t3);pointer-events:none}
  .search-input{width:100%;padding:10px 36px 10px 38px;background:var(--card);border:1.5px solid var(--brd);border-radius:10px;color:var(--t1);font-size:.82rem;font-family:inherit;outline:none;transition:border-color .2s}
  .search-input::placeholder{color:var(--t3)}
  .search-input:focus{border-color:var(--teal)}
  .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:var(--bg);border:none;border-radius:50%;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);display:none}
  .search-clear.show{display:flex}
  .search-clear svg{width:12px;height:12px}

  .fbtn{width:40px;height:40px;background:var(--card);border:1.5px solid var(--brd);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative;transition:border-color .2s}
  .fbtn.on{border-color:var(--teal)}
  .fbtn svg{width:18px;height:18px;color:var(--t2)}
  .fbtn.on svg{color:var(--teal)}
  .fbadge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--teal);border-radius:50%;font-size:.55rem;font-weight:800;color:#fff;align-items:center;justify-content:center;display:none}
  .fbadge.show{display:flex}

  .fdrop{display:none;margin-top:8px;padding:10px;background:var(--card);border:1.5px solid var(--brd);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
  .fdrop.open{display:block}
  .fgl{font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .fgl+.fgl{margin-top:10px}
  .fchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .chip{padding:5px 12px;background:var(--bg);border:1.5px solid var(--brd);border-radius:16px;font-size:.72rem;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
  .chip:hover{border-color:var(--teal)}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff}

  /* CONTENT */
  .content{padding:12px 16px calc(var(--sab) + 20px)}

  .cblock{background:var(--card);border-radius:12px;margin-bottom:14px;box-shadow:var(--shd);overflow:hidden;animation:fu .3s ease-out both}
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .cblock:nth-child(1){animation-delay:0s}
  .cblock:nth-child(2){animation-delay:.04s}
  .cblock:nth-child(3){animation-delay:.08s}
  .cblock:nth-child(4){animation-delay:.12s}
  .cblock:nth-child(5){animation-delay:.16s}
  .cblock:nth-child(6){animation-delay:.2s}
  .cblock:nth-child(7){animation-delay:.24s}

  .ctbar{padding:14px 16px 10px;border-bottom:2.5px solid var(--brd)}
  .ctbar.org{border-bottom-color:var(--c-org)}
  .ctbar.apoio{border-bottom-color:var(--c-apoio)}
  .ctbar.sucursal{border-bottom-color:var(--c-suc)}
  .ctrow{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .cname{font-weight:800;font-size:.95rem;color:var(--t1)}
  .ctag{font-size:.68rem;font-weight:700}
  .ctag.org{color:var(--c-org)}
  .ctag.apoio{color:var(--c-apoio)}

  /* GRID */
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:16px 12px}
  .gp{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 4px}
  .gav{width:72px;height:72px;border-radius:50%;overflow:hidden;background:#E8E8E8;border:2.5px solid #D0D0D0;margin-bottom:8px}
  .gav img{width:100%;height:100%;object-fit:cover;display:block}
  .gav .sil{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#E0E0E0}
  .gn{font-weight:700;font-size:.8rem;line-height:1.2;margin-bottom:1px}
  .gc{font-size:.7rem;color:var(--t3)}

  /* LIST */
  .plist{padding:8px 16px 12px}
  .lp{display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid #F0F0F0}
  .lp:last-child{border-bottom:none}
  .lav{width:54px;height:54px;border-radius:50%;overflow:hidden;background:#E8E8E8;border:2px solid #D0D0D0;flex-shrink:0}
  .lav img{width:100%;height:100%;object-fit:cover;display:block}
  .lav .sil{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#E0E0E0}
  .li{flex:1;min-width:0}
  .ln{font-weight:700;font-size:.88rem;line-height:1.2}
  .lc{font-size:.78rem;color:var(--t3);margin-top:1px}
  .ld{margin-top:6px;font-size:.78rem;color:var(--t2);line-height:1.4}
  .ld strong{font-weight:700;color:var(--t1)}

  /* EMPTY */
  .empty{text-align:center;padding:48px 24px}
  .eico{width:52px;height:52px;border-radius:50%;background:#ECECEC;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .eico svg{width:24px;height:24px;color:var(--t3)}
  .empty h3{font-size:.92rem;color:var(--t2);margin-bottom:4px}
  .empty p{font-size:.78rem;color:var(--t3)}

  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-thumb{background:#D0D0D0;border-radius:3px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<!-- Silhouette SVG template (hidden, cloned via JS) -->
<template id="silTpl">
  <div class="sil">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="width:60%;height:60%">
      <circle cx="40" cy="28" r="13" fill="#BCBCBC"/>
      <ellipse cx="40" cy="66" rx="22" ry="16" fill="#BCBCBC"/>
    </svg>
  </div>
</template>

<script>
const PH = 'https://randomuser.me/api/portraits';

const DATA = [
  {
    company: "Seguros Unimed", type: "org", tag: "Organizadora", layout: "grid",
    participants: [
      { name: "Ricardo Monteiro", cargo: "Diretor Executivo", photo: PH+"/men/32.jpg" },
      { name: "Camila Barros", cargo: "Superintendente de Saúde", photo: PH+"/women/44.jpg" },
      { name: "Henrique Tavares", cargo: "Gerente de Operações", photo: PH+"/men/45.jpg" },
      { name: "Isabela Nunes", cargo: "Coord. de Eventos", photo: PH+"/women/68.jpg" },
      { name: "Amanda Lopes", cargo: "Analista de Eventos", photo: PH+"/women/55.jpg" },
      { name: "Marcos Vieira", cargo: "Diretor Comercial", photo: PH+"/men/52.jpg" },
    ]
  },
  {
    company: "Universidade Unimed", type: "apoio", tag: "Apoiadora", layout: "list",
    participants: [
      { name: "Prof. Maria Lúcia Andrade", cargo: "Reitora", photo: PH+"/women/72.jpg" },
      { name: "Prof. José Roberto Silva", cargo: "Coord. Acadêmico", photo: PH+"/men/67.jpg" },
    ]
  },
  {
    company: "Seguros Unimed Alta Mogiana", type: "sucursal", tag: "", layout: "list",
    participants: [
      { name: "Fernando Reis", cargo: "Diretor Presidente", photo: PH+"/men/61.jpg", categoria: "Dados e Inteligência em Saúde", case_name: "Ecossistema Digital de Cuidado Contínuo" },
      { name: "Mariana Duarte", cargo: "Diretora de Inovação", photo: PH+"/women/33.jpg", categoria: "Experiência do Cliente", case_name: "Jornada Integrada do Paciente Crônico" },
    ]
  },
  {
    company: "Seguros Unimed Ribeirão Preto", type: "sucursal", tag: "", layout: "list",
    participants: [
      { name: "Paulo Henrique Lima", cargo: "Diretor Técnico", photo: PH+"/men/22.jpg", categoria: "Transformação Digital", case_name: "Telemedicina Integrada com IA" },
      { name: "Letícia Moraes", cargo: "Gerente de Projetos", photo: PH+"/women/29.jpg", categoria: "Gestão de Sinistros", case_name: "Redução de Fraudes com Machine Learning" },
    ]
  },
  {
    company: "Seguros Unimed Campinas", type: "sucursal", tag: "", layout: "list",
    participants: [
      { name: "Gustavo Teixeira", cargo: "Diretor Administrativo", photo: PH+"/men/36.jpg", categoria: "Sustentabilidade", case_name: "Programa Saúde Verde" },
      { name: "Aline Bastos", cargo: "Coord. de Qualidade", photo: PH+"/women/41.jpg", categoria: "Qualidade Assistencial", case_name: "Acreditação Digital de Prestadores" },
      { name: "Eduardo Bahia", cargo: "Analista Sênior", photo: PH+"/men/55.jpg", categoria: "Dados e Inteligência em Saúde", case_name: "Dashboard Preditivo de Internações" },
    ]
  },
  {
    company: "Seguros Unimed Belo Horizonte", type: "sucursal", tag: "", layout: "list",
    participants: [
      { name: "Renata Souza", cargo: "Diretora Geral", photo: PH+"/women/62.jpg", categoria: "Experiência do Cliente", case_name: "App de Acompanhamento Pós-Cirúrgico" },
      { name: "Diego Martins", cargo: "Coord. de Tecnologia", photo: PH+"/men/28.jpg", categoria: "Transformação Digital", case_name: "Prontuário Eletrônico Unificado" },
    ]
  },
];

// ── Helpers ──
function getCats(d) {
  const s = new Set();
  d.forEach(c => c.participants.forEach(p => { if (p.categoria) s.add(p.categoria); }));
  return [...s].sort((a,b) => a.localeCompare(b,'pt-BR'));
}

function getTypes(d) {
  const r = [], seen = new Set();
  const map = { org:'Organizadora', apoio:'Apoiadora', sucursal:'Sucursais' };
  d.forEach(c => { if(!seen.has(c.type)){seen.add(c.type);r.push({type:c.type,label:map[c.type]})} });
  return r;
}

// ── State ──
let S = { q:'', fo:false, ft:null, fc:null };

function filtered() {
  let r = DATA;
  if (S.ft) r = r.filter(c => c.type === S.ft);
  if (S.fc) r = r.map(c => ({...c, participants:c.participants.filter(p=>p.categoria===S.fc)})).filter(c=>c.participants.length);
  if (S.q.trim()) {
    const q = S.q.toLowerCase();
    r = r.map(c => ({...c, participants:c.participants.filter(p =>
      p.name.toLowerCase().includes(q) || p.cargo.toLowerCase().includes(q) ||
      (p.categoria||'').toLowerCase().includes(q) || (p.case_name||'').toLowerCase().includes(q) ||
      c.company.toLowerCase().includes(q)
    )})).filter(c=>c.participants.length);
  }
  return r;
}

// ── Silhouette fallback (safe, no inline SVG in template literals) ──
function makeSil(container) {
  const tpl = document.getElementById('silTpl');
  const clone = tpl.content.cloneNode(true);
  container.innerHTML = '';
  container.appendChild(clone);
}

// ── Build DOM (no innerHTML for complex parts) ──
function render() {
  const app = document.getElementById('app');
  const data = filtered();
  const types = getTypes(DATA);
  const cats = getCats(DATA);
  const nf = (S.ft?1:0)+(S.fc?1:0);

  // Build HTML for toolbar (safe — no SVG in template literals)
  app.innerHTML = '';

  // Hero
  const hero = document.createElement('div');
  hero.className = 'hero';
  hero.innerHTML = '<h1>Conheça quem embarca<br>com você nesta jornada!</h1>';
  app.appendChild(hero);

  // Toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'toolbar';

  const searchRow = document.createElement('div');
  searchRow.className = 'search-row';

  const searchWrap = document.createElement('div');
  searchWrap.className = 'search-wrap';

  const searchIcon = document.createElementNS('http://www.w3.org/2000/svg','svg');
  searchIcon.setAttribute('viewBox','0 0 24 24');
  searchIcon.setAttribute('fill','none');
  searchIcon.setAttribute('stroke','currentColor');
  searchIcon.setAttribute('stroke-width','2');
  searchIcon.setAttribute('stroke-linecap','round');
  searchIcon.setAttribute('stroke-linejoin','round');
  searchIcon.innerHTML = '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>';
  searchWrap.appendChild(searchIcon);

  const searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.className = 'search-input';
  searchInput.placeholder = 'Buscar nome, empresa, categoria...';
  searchInput.value = S.q;
  searchInput.id = 'si';
  searchWrap.appendChild(searchInput);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'search-clear' + (S.q ? ' show' : '');
  clearBtn.id = 'sc';
  clearBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
  searchWrap.appendChild(clearBtn);

  searchRow.appendChild(searchWrap);

  const filterBtn = document.createElement('button');
  filterBtn.className = 'fbtn' + (S.fo ? ' on' : '');
  filterBtn.id = 'ft';
  filterBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>';
  const badge = document.createElement('span');
  badge.className = 'fbadge' + (nf > 0 ? ' show' : '');
  badge.textContent = nf;
  filterBtn.appendChild(badge);
  searchRow.appendChild(filterBtn);

  toolbar.appendChild(searchRow);

  // Filter dropdown
  const fdrop = document.createElement('div');
  fdrop.className = 'fdrop' + (S.fo ? ' open' : '');

  // Type chips
  const tLabel = document.createElement('div');
  tLabel.className = 'fgl';
  tLabel.textContent = 'Tipo';
  fdrop.appendChild(tLabel);

  const tChips = document.createElement('div');
  tChips.className = 'fchips';

  const allChip = document.createElement('button');
  allChip.className = 'chip' + (!S.ft ? ' on' : '');
  allChip.textContent = 'Todos';
  allChip.dataset.ft = '';
  tChips.appendChild(allChip);

  types.forEach(t => {
    const c = document.createElement('button');
    c.className = 'chip' + (S.ft === t.type ? ' on' : '');
    c.textContent = t.label;
    c.dataset.ft = t.type;
    tChips.appendChild(c);
  });
  fdrop.appendChild(tChips);

  // Category chips
  if (cats.length) {
    const cLabel = document.createElement('div');
    cLabel.className = 'fgl';
    cLabel.textContent = 'Categoria';
    fdrop.appendChild(cLabel);

    const cChips = document.createElement('div');
    cChips.className = 'fchips';

    const allCat = document.createElement('button');
    allCat.className = 'chip' + (!S.fc ? ' on' : '');
    allCat.textContent = 'Todas';
    allCat.dataset.fc = '';
    cChips.appendChild(allCat);

    cats.forEach(cat => {
      const c = document.createElement('button');
      c.className = 'chip' + (S.fc === cat ? ' on' : '');
      c.textContent = cat;
      c.dataset.fc = cat;
      cChips.appendChild(c);
    });
    fdrop.appendChild(cChips);
  }

  toolbar.appendChild(fdrop);
  app.appendChild(toolbar);

  // Content
  const content = document.createElement('div');
  content.className = 'content';

  if (!data.length) {
    content.innerHTML = '<div class="empty"><div class="eico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div><h3>Nenhum resultado</h3><p>Tente buscar por outro nome ou ajuste os filtros</p></div>';
  } else {
    data.forEach(comp => {
      const block = document.createElement('div');
      block.className = 'cblock';

      // Title bar
      const tbar = document.createElement('div');
      tbar.className = 'ctbar ' + comp.type;
      const trow = document.createElement('div');
      trow.className = 'ctrow';
      const cn = document.createElement('span');
      cn.className = 'cname';
      cn.textContent = comp.company;
      trow.appendChild(cn);
      if (comp.tag) {
        const ct = document.createElement('span');
        ct.className = 'ctag ' + comp.type;
        ct.textContent = comp.tag;
        trow.appendChild(ct);
      }
      tbar.appendChild(trow);
      block.appendChild(tbar);

      if (comp.layout === 'grid') {
        // Grid layout
        const grid = document.createElement('div');
        grid.className = 'pgrid';
        comp.participants.forEach(p => {
          const gp = document.createElement('div');
          gp.className = 'gp';

          const av = document.createElement('div');
          av.className = 'gav';
          if (p.photo) {
            const img = document.createElement('img');
            img.src = p.photo;
            img.loading = 'lazy';
            img.alt = p.name;
            img.onerror = function() { makeSil(av); };
            av.appendChild(img);
          } else {
            makeSil(av);
          }
          gp.appendChild(av);

          const nm = document.createElement('div');
          nm.className = 'gn';
          nm.textContent = p.name;
          gp.appendChild(nm);

          const cg = document.createElement('div');
          cg.className = 'gc';
          cg.textContent = p.cargo;
          gp.appendChild(cg);

          grid.appendChild(gp);
        });
        block.appendChild(grid);
      } else {
        // List layout
        const list = document.createElement('div');
        list.className = 'plist';
        comp.participants.forEach(p => {
          const lp = document.createElement('div');
          lp.className = 'lp';

          const av = document.createElement('div');
          av.className = 'lav';
          if (p.photo) {
            const img = document.createElement('img');
            img.src = p.photo;
            img.loading = 'lazy';
            img.alt = p.name;
            img.onerror = function() { makeSil(av); };
            av.appendChild(img);
          } else {
            makeSil(av);
          }
          lp.appendChild(av);

          const info = document.createElement('div');
          info.className = 'li';

          const nm = document.createElement('div');
          nm.className = 'ln';
          nm.textContent = p.name;
          info.appendChild(nm);

          const cg = document.createElement('div');
          cg.className = 'lc';
          cg.textContent = p.cargo;
          info.appendChild(cg);

          if (p.categoria || p.case_name) {
            const det = document.createElement('div');
            det.className = 'ld';
            let html = '';
            if (p.categoria) html += '<strong>Categoria:</strong> ' + p.categoria + '<br>';
            if (p.case_name) html += '<strong>Case:</strong> ' + p.case_name;
            det.innerHTML = html;
            info.appendChild(det);
          }

          lp.appendChild(info);
          list.appendChild(lp);
        });
        block.appendChild(list);
      }

      content.appendChild(block);
    });
  }

  app.appendChild(content);

  // ── Events ──
  searchInput.addEventListener('input', function() {
    S.q = this.value;
    render();
    const el = document.getElementById('si');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  });

  clearBtn.addEventListener('click', function() {
    S.q = '';
    render();
    document.getElementById('si')?.focus();
  });

  filterBtn.addEventListener('click', function() {
    S.fo = !S.fo;
    render();
  });

  document.querySelectorAll('[data-ft]').forEach(b => {
    b.addEventListener('click', function() {
      S.ft = this.dataset.ft || null;
      render();
    });
  });

  document.querySelectorAll('[data-fc]').forEach(b => {
    b.addEventListener('click', function() {
      S.fc = this.dataset.fc || null;
      render();
    });
  });
}

render();
</script>
</body>
</html>
